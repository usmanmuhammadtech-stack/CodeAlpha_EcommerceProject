<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — ShopZone</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="/" class="logo">Shop<span>Zone</span></a>
  <div class="nav-actions">
    <div class="auth-btns" id="auth-btns">
      <a href="/login.html" class="btn-outline-sm">Login</a>
    </div>
    <div class="user-menu" id="user-menu" style="display:none">
      <button class="user-btn" onclick="toggleUserMenu()">
        <span class="user-avatar" id="user-avatar">U</span>
        <span id="user-name-nav"></span>
      </button>
      <div class="user-dropdown" id="user-dropdown">
        <a href="/orders.html"><i class="fa-solid fa-box"></i> My Orders</a>
        <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </div>
  </div>
</nav>

<div class="checkout-page">
  <div class="checkout-layout">
    <!-- LEFT: FORM -->
    <div class="checkout-form-col">
      <h2 class="checkout-title"><i class="fa-solid fa-location-dot"></i> Shipping Details</h2>
      <div class="checkout-error" id="checkout-error" style="display:none"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="sh-name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="sh-phone" placeholder="03XX-XXXXXXX"/>
        </div>
      </div>
      <div class="form-group">
        <label>Street Address</label>
        <input type="text" id="sh-address" placeholder="House #, Street, Area"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="sh-city" placeholder="Lahore"/>
        </div>
        <div class="form-group">
          <label>Province</label>
          <select id="sh-province">
            <option>Punjab</option>
            <option>Sindh</option>
            <option>KPK</option>
            <option>Balochistan</option>
          </select>
        </div>
      </div>

      <h2 class="checkout-title" style="margin-top:32px">
        <i class="fa-solid fa-credit-card"></i> Payment Method
      </h2>
      <div class="payment-options">
        <label class="payment-option active">
          <input type="radio" name="payment" value="cod" checked/>
          <i class="fa-solid fa-money-bill-wave"></i>
          <div><strong>Cash on Delivery</strong><span>Pay when you receive</span></div>
        </label>
        <label class="payment-option">
          <input type="radio" name="payment" value="card"/>
          <i class="fa-solid fa-credit-card"></i>
          <div><strong>Credit/Debit Card</strong><span>Visa, Mastercard</span></div>
        </label>
        <label class="payment-option">
          <input type="radio" name="payment" value="easypaisa"/>
          <i class="fa-solid fa-mobile-screen"></i>
          <div><strong>EasyPaisa / JazzCash</strong><span>Mobile wallet</span></div>
        </label>
      </div>

      <button class="place-order-btn" id="place-order-btn" onclick="placeOrder()">
        <i class="fa-solid fa-bag-shopping"></i> Place Order
      </button>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="checkout-summary-col">
      <h2 class="checkout-title">Order Summary</h2>
      <div class="order-items-list" id="order-items-list"></div>
      <div class="order-totals">
        <div class="total-row"><span>Subtotal</span><span id="co-subtotal">Rs. 0</span></div>
        <div class="total-row"><span>Shipping</span><span class="free-ship">FREE</span></div>
        <div class="total-row total-final"><span>Total</span><strong id="co-total">Rs. 0</strong></div>
      </div>
    </div>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="success-modal" style="display:none">
  <div class="success-modal">
    <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
    <h2>Order Placed!</h2>
    <p>Your order has been confirmed. We'll deliver it soon!</p>
    <p class="order-id-text">Order ID: <strong id="modal-order-id">#0</strong></p>
    <div class="success-actions">
      <a href="/orders.html" class="btn-hero">View My Orders</a>
      <a href="/" class="btn-hero-ghost">Continue Shopping</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/checkout.js"></script>
</body>
</html>
