<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — ShopZone</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="/" class="logo">Shop<span>Zone</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/products.html" class="active">Products</a></li>
    <li><a href="/orders.html" id="orders-nav" style="display:none">My Orders</a></li>
  </ul>
  <div class="nav-actions">
    <button class="cart-btn" onclick="toggleCart()">
      <i class="fa-solid fa-bag-shopping"></i>
      <span class="cart-count" id="cart-count">0</span>
    </button>
    <div class="auth-btns" id="auth-btns">
      <a href="/login.html" class="btn-outline-sm">Login</a>
      <a href="/register.html" class="btn-filled-sm">Sign Up</a>
    </div>
    <div class="user-menu" id="user-menu" style="display:none">
      <button class="user-btn" onclick="toggleUserMenu()">
        <span class="user-avatar" id="user-avatar">U</span>
        <span id="user-name-nav"></span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div class="user-dropdown" id="user-dropdown">
        <a href="/orders.html"><i class="fa-solid fa-box"></i> My Orders</a>
        <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>All <span>Products</span></h1>
  <div class="breadcrumb"><a href="/">Home</a> / Products</div>
</div>

<div class="products-page-layout">
  <!-- SIDEBAR FILTERS -->
  <aside class="filter-sidebar">
    <div class="filter-group">
      <h4>Categories</h4>
      <div class="filter-cats" id="filter-cats">
        <label class="filter-cat active"><input type="radio" name="cat" value="all" checked> All Products</label>
      </div>
    </div>
    <div class="filter-group">
      <h4>Price Range</h4>
      <div class="price-inputs">
        <input type="number" id="min-price" placeholder="Min" />
        <span>—</span>
        <input type="number" id="max-price" placeholder="Max" />
      </div>
      <button class="apply-price-btn" onclick="applyFilters()">Apply</button>
    </div>
    <div class="filter-group">
      <h4>Sort By</h4>
      <select id="sort-select" onchange="applyFilters()">
        <option value="">Featured</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="newest">Newest</option>
      </select>
    </div>
    <button class="clear-filters-btn" onclick="clearFilters()">Clear Filters</button>
  </aside>

  <!-- PRODUCTS GRID -->
  <main class="products-main">
    <div class="products-toolbar">
      <div class="search-inline">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="search-inline" placeholder="Search products..." oninput="applyFilters()"/>
      </div>
      <span class="results-count" id="results-count">Loading...</span>
    </div>
    <div class="products-grid" id="products-grid">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<aside class="cart-sidebar" id="cart-sidebar">
  <div class="cart-head">
    <h3><i class="fa-solid fa-bag-shopping"></i> Your Cart</h3>
    <button onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-foot" id="cart-foot" style="display:none">
    <div class="cart-total-row">
      <span>Subtotal</span>
      <strong id="cart-total">Rs. 0</strong>
    </div>
    <a href="/checkout.html" class="btn-checkout">Proceed to Checkout <i class="fa-solid fa-arrow-right"></i></a>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/products-page.js"></script>
</body>
</html>
