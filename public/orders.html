<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — ShopZone</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="/" class="logo">Shop<span>Zone</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/products.html">Products</a></li>
    <li><a href="/orders.html" class="active">My Orders</a></li>
  </ul>
  <div class="nav-actions">
    <button class="cart-btn" onclick="toggleCart()">
      <i class="fa-solid fa-bag-shopping"></i>
      <span class="cart-count" id="cart-count">0</span>
    </button>
    <div class="user-menu" id="user-menu" style="display:none">
      <button class="user-btn" onclick="toggleUserMenu()">
        <span class="user-avatar" id="user-avatar">U</span>
        <span id="user-name-nav"></span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div class="user-dropdown" id="user-dropdown">
        <a href="/orders.html"><i class="fa-solid fa-box"></i> My Orders</a>
        <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </div>
    <div class="auth-btns" id="auth-btns">
      <a href="/login.html" class="btn-filled-sm">Login</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>My <span>Orders</span></h1>
  <div class="breadcrumb"><a href="/">Home</a> / My Orders</div>
</div>

<div class="orders-page" id="orders-page">
  <div class="loading-spinner"><div class="spinner"></div></div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<aside class="cart-sidebar" id="cart-sidebar">
  <div class="cart-head">
    <h3><i class="fa-solid fa-bag-shopping"></i> Your Cart</h3>
    <button onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-foot" id="cart-foot" style="display:none">
    <div class="cart-total-row">
      <span>Subtotal</span>
      <strong id="cart-total">Rs. 0</strong>
    </div>
    <a href="/checkout.html" class="btn-checkout">
      Proceed to Checkout <i class="fa-solid fa-arrow-right"></i>
    </a>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/orders-page.js"></script>
</body>
</html>
